<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: pink;
    }

    img {
      width: 80%;
      margin-top:17px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: black;
      color: pink;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;

      /* ANIMAÇÃO PULSAR */
      animation: pulsar 1.5s infinite;
    }

    /* PULSAR */
    @keyframes pulsar {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    /* HOVER */
    .btn:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<img src="1.png" alt="1">

<br>

<a href="about.html" class="btn">About</a>
<a href="titles.html" class="btn">Titles</a>
<a href="players.html" class="btn">Players</a>
<a href="opinion.html" class="btn">Opinion</a>

</body>
</html>
